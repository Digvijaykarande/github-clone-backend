name: Build and deploy Spring Boot app to Azure Web App

on:
  push:
    branches:
      - main 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Upgraded to v4

      - name: Set up Java version
        uses: actions/setup-java@v4 # Upgraded to v4
        with:
          java-version: '17' 
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean install -DskipTests 

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4 # Upgraded to v4
        with:
          name: java-app
          path: '${{ github.workspace }}/target/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4 # Upgraded to v4
        with:
          name: java-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'devhub' 
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: '*.jar'
